<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H1-H6 Word Buddy Quest</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="login-panel" id="loginPanel" aria-label="玩家登入">
      <div class="login-card">
        <p class="eyebrow">Player Login</p>
        <h1>選擇玩家</h1>
        <p>輸入名字或選擇之前的玩家，就可以接續自己的單字進度。</p>
        <div class="login-fields">
          <label for="playerNameInput">玩家名字</label>
          <input id="playerNameInput" type="text" maxlength="18" placeholder="例如：小安" autocomplete="off" />
          <label for="playerSelect">已儲存玩家</label>
          <select id="playerSelect">
            <option value="">尚無玩家</option>
          </select>
        </div>
        <p class="login-message" id="loginMessage" role="status"></p>
        <button class="secondary-button start-button" id="startPlayerButton" type="button">開始 / 接續</button>
      </div>
    </section>

    <main class="app-shell" id="appShell" hidden>
      <section class="hero-panel" aria-label="夥伴與遊戲進度">
        <div class="top-bar">
          <div>
            <p class="eyebrow">H1-H6 English Quest</p>
            <h1>Word Buddy Quest</h1>
          </div>
          <div class="top-actions">
            <button class="icon-button" id="soundButton" type="button" aria-label="播放英文單字">
              <span aria-hidden="true">🔊</span>
            </button>
            <button class="text-button" id="switchPlayerButton" type="button">換玩家</button>
          </div>
        </div>

        <div class="creature-stage" aria-live="polite">
          <div class="spark spark-a"></div>
          <div class="spark spark-b"></div>
          <svg class="buddy buddy-idle" viewBox="0 0 260 220" role="img" aria-label="原創單字夥伴 Flufflet">
            <defs>
              <linearGradient id="bodyGradient" x1="0" x2="1" y1="0" y2="1">
                <stop id="bodyStopA" offset="0%" stop-color="#ffef8a" />
                <stop id="bodyStopB" offset="100%" stop-color="#ff9f7a" />
              </linearGradient>
              <linearGradient id="wingGradient" x1="0" x2="1">
                <stop id="wingStopA" offset="0%" stop-color="#72d8ff" />
                <stop id="wingStopB" offset="100%" stop-color="#4a7dff" />
              </linearGradient>
              <linearGradient id="faceGlow" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#ffffff" stop-opacity=".72" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
              </linearGradient>
              <filter id="battleGlow" x="-35%" y="-35%" width="170%" height="170%">
                <feGaussianBlur stdDeviation="3.5" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <ellipse cx="130" cy="206" rx="82" ry="11" fill="#050816" opacity=".46" />
            <path d="M39 134l36-21 24 15-37 33z" fill="url(#wingGradient)" opacity=".75" />
            <path d="M221 134l-36-21-24 15 37 33z" fill="url(#wingGradient)" opacity=".75" />
            <path d="M76 70l32-30 22 14-36 40z" fill="url(#bodyGradient)" />
            <path d="M184 70l-32-30-22 14 36 40z" fill="url(#bodyGradient)" />
            <path d="M80 113c0-47 20-74 50-74s50 27 50 74c0 51-18 82-50 82s-50-31-50-82z" fill="url(#bodyGradient)" />
            <path d="M92 94c6-24 20-36 38-36s32 12 38 36c-8 16-22 25-38 25s-30-9-38-25z" fill="#12192d" opacity=".9" />
            <path id="crestA" d="M130 20l14 27 31 5-22 22 5 31-28-15-28 15 5-31-22-22 31-5z" fill="#ffcc33" filter="url(#battleGlow)" />
            <path id="crestB" d="M103 74h54l-13 20h-28z" fill="url(#wingGradient)" opacity=".9" />
            <path d="M67 126l32 23-15 44-39-33z" fill="#0f1629" />
            <path d="M193 126l-32 23 15 44 39-33z" fill="#0f1629" />
            <path d="M100 150h60l16 43H84z" fill="url(#wingGradient)" opacity=".86" />
            <path d="M118 145h24l8 34h-40z" fill="#10182c" opacity=".82" />
            <path d="M53 103l-24-22 33 4 15-31 8 40z" fill="url(#wingGradient)" filter="url(#battleGlow)" />
            <path d="M207 103l24-22-33 4-15-31-8 40z" fill="url(#wingGradient)" filter="url(#battleGlow)" />
            <path d="M71 180l-30 25 11-43z" fill="url(#wingGradient)" filter="url(#battleGlow)" />
            <path d="M189 180l30 25-11-43z" fill="url(#wingGradient)" filter="url(#battleGlow)" />
            <circle cx="111" cy="113" r="13" fill="#f6f8ff" />
            <circle cx="150" cy="113" r="13" fill="#f6f8ff" />
            <path d="M101 108l21 5-17 7z" fill="#13192c" />
            <path d="M160 108l-21 5 17 7z" fill="#13192c" />
            <path d="M116 139c9 8 21 8 30 0" fill="none" stroke="#f6f8ff" stroke-width="6" stroke-linecap="round" />
            <path d="M96 191l-23 13 5-30" fill="none" stroke="#11172a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M164 191l23 13-5-30" fill="none" stroke="#11172a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>

        <div class="pet-status" aria-live="polite">
          <span id="activePetIcon">🐣</span>
          <div>
            <strong id="activePetName">Flufflet</strong>
            <small id="playerText">玩家：--</small>
          </div>
        </div>

        <div class="stats-grid" aria-label="分數與等級">
          <article>
            <span>分數</span>
            <strong id="scoreText">0</strong>
          </article>
          <article>
            <span>連擊</span>
            <strong id="streakText">0</strong>
          </article>
          <article>
            <span>等級</span>
            <strong id="levelText">1</strong>
          </article>
        </div>

        <div class="energy-wrap">
          <div class="energy-label">
            <span>升級能量</span>
            <span id="energyText">0 / 100</span>
          </div>
          <div class="energy-bar" aria-hidden="true">
            <div id="energyFill"></div>
          </div>
        </div>
      </section>

      <section class="game-panel" aria-label="單字選擇題">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Practice Words</p>
            <h2 id="questionWord">tea</h2>
          </div>
          <select id="categorySelect" aria-label="選擇已解鎖課別">
            <option value="all">已解鎖全部</option>
          </select>
        </div>

        <div class="mode-tabs" aria-label="選擇練習模式">
          <button class="mode-tab active" type="button" data-mode="spelling" aria-pressed="true">
            拼字
          </button>
          <button class="mode-tab" type="button" data-mode="phonics" aria-pressed="false">
            自然發音
          </button>
        </div>

        <p class="hint" id="hintText">聽單字，選出正確的中文意思。</p>
        <div class="choice-grid" id="choiceGrid"></div>

        <section class="spelling-panel" id="spellingPanel" aria-label="拼字練習" hidden>
          <div class="spell-card">
            <span class="spell-label">拼出英文</span>
            <strong id="spellClue">茶 · 3 個字母</strong>
            <div class="spell-slots" id="spellSlots" aria-hidden="true"></div>
            <input id="spellInput" type="text" readonly aria-label="目前拼出的單字" />
          </div>
          <div class="letter-bank" id="letterBank" aria-label="可選字母"></div>
          <div class="spell-actions">
            <button class="secondary-button small-button" id="backspaceButton" type="button">退一格</button>
            <button class="secondary-button small-button" id="clearSpellButton" type="button">清除</button>
            <button class="secondary-button small-button primary-check" id="checkSpellButton" type="button">檢查</button>
          </div>
        </section>

        <div class="feedback" id="feedback" role="status" aria-live="polite">
          準備好了嗎？答對就能集點升級。
        </div>

        <div class="controls">
          <button class="secondary-button" id="newRoundButton" type="button">下一題</button>
          <button class="secondary-button" id="resetButton" type="button">重新開始</button>
        </div>

        <section class="level-road" aria-label="H1-H6 級數進度">
          <div class="section-title">
            <h3>H1-H6 級數進度</h3>
            <span>依考卷課別接續解鎖</span>
          </div>
          <div class="level-road-grid" id="levelRoad"></div>
        </section>

        <section class="collection" aria-label="徽章收藏">
          <div class="section-title">
            <h3>徽章收藏</h3>
            <span id="badgeCount">0 / 5</span>
          </div>
          <div class="badge-row" id="badgeRow"></div>
        </section>

        <section class="collection" aria-label="夥伴收藏">
          <div class="section-title">
            <h3>夥伴收藏</h3>
            <span id="buddyCount">1 / 4</span>
          </div>
          <div class="buddy-row" id="buddyRow"></div>
        </section>
      </section>
    </main>

    <template id="choiceTemplate">
      <button class="choice-card" type="button">
        <span class="choice-emoji"></span>
        <span class="choice-text"></span>
      </button>
    </template>

    <script src="app.js"></script>
  </body>
</html>
